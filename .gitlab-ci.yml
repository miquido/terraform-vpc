stages:
  - test
  - release

validate-terraform:
  stage: test
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - terraform fmt -check -recursive
    - terraform init -backend=false
    - terraform validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - docker
    - miquido

validate-readme:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl
    - curl -sSLo /tmp/terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.24.0/terraform-docs-v0.24.0-linux-amd64.tar.gz
    - tar -xzf /tmp/terraform-docs.tar.gz -C /usr/local/bin/ terraform-docs
  script:
    - terraform-docs --output-check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - docker
    - miquido

release:
  stage: release
  image: node:22-alpine
  before_script:
    - apk add --no-cache git
    - npm install -g semantic-release @semantic-release/changelog @semantic-release/gitlab @semantic-release/git
  script:
    - npx semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - docker
    - miquido
